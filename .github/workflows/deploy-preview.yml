name: Deploy docs · PR preview

# Every PR gets its own live deployment. We upload a new Worker *version*
# without promoting it to production (`wrangler versions upload`) and pin a
# stable per-PR alias, so the URL stays the same across pushes:
#   https://pr-<number>-mugen.<your-subdomain>.workers.dev
# The URL is then posted as a sticky comment on the PR.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/docs/**'
      - 'packages/mugen/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-preview.yml'

# One preview per PR; cancel superseded runs when new commits land.
concurrency:
  group: docs-preview-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write # to post/update the preview comment

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # safety net so a hung build can't run for hours
    # Secrets aren't exposed to PRs from forks, so wrangler can't authenticate.
    # Skip those; they still get a production deploy once merged.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        env:
          # Prerender crawls routes under workerd, which hangs on CI runners.
          # Ship an SSR-only Worker; every route renders on demand at the edge.
          DISABLE_PRERENDER: '1'

      - name: Upload preview version to Cloudflare
        id: upload
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/docs
          wranglerVersion: '4' # aliased preview URLs need wrangler >= 4.21.0
          # `pr-<n>` is a valid alias: lowercase, starts with a letter, short.
          command: versions upload --preview-alias pr-${{ github.event.number }}

      - name: Extract preview URL
        id: url
        env:
          WRANGLER_OUTPUT: ${{ steps.upload.outputs.command-output }}
        run: |
          # Prefer the stable aliased URL; fall back to the per-version URL.
          preview_url=$(printf '%s' "$WRANGLER_OUTPUT" \
            | grep -oE 'https://pr-[0-9]+-mugen\.[a-z0-9.-]+\.workers\.dev' \
            | head -n1)
          if [ -z "$preview_url" ]; then
            preview_url=$(printf '%s' "$WRANGLER_OUTPUT" \
              | grep -oE 'https://[a-z0-9.-]+\.workers\.dev' \
              | head -n1)
          fi
          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.url.outputs.preview_url }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const marker = '<!-- docs-preview -->';
            const url = process.env.PREVIEW_URL;
            const sha = (process.env.HEAD_SHA || '').slice(0, 7);
            const body = [
              marker,
              '### 📖 Docs preview',
              '',
              url
                ? `Deployed to a Cloudflare Workers preview:\n\n**${url}**`
                : 'Preview URL not found — check the workflow logs.',
              '',
              `_Updated for commit \`${sha}\`._`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              (c) => c.body && c.body.includes(marker),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
