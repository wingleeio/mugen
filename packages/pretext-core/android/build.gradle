buildscript {
  repositories { google(); mavenCentral() }
  dependencies { classpath "com.android.tools.build:gradle:8.5.0" }
}

def isNewArchitectureEnabled() {
  return project.hasProperty("newArchEnabled") && project.newArchEnabled == "true"
}

apply plugin: "com.android.library"

android {
  namespace "com.margelo.nitro.pretextcore"
  compileSdkVersion safeExtGet("compileSdkVersion", 35)

  defaultConfig {
    minSdkVersion safeExtGet("minSdkVersion", 24)
    externalNativeBuild {
      cmake {
        arguments "-DANDROID_STL=c++_shared"
        cppFlags "-std=c++20", "-ffp-contract=off", "-fno-fast-math"
      }
    }
  }

  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
    }
  }

  // Nitrogen-generated gradle wiring (source sets, prefab, etc.).
  apply from: file("../nitrogen/generated/android/PretextCore+autolinking.gradle")
}

def safeExtGet(prop, fallback) {
  rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

repositories { google(); mavenCentral() }

dependencies {
  implementation "com.facebook.react:react-android"
}
